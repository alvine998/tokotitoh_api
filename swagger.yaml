openapi: 3.0.0
info:
  title: Tokotitoh API - documentation
  version: 1.0.0
  description: API documentation for the Tokotitoh application.
servers:
  - url: https://api.tokotitoh.co.id
    description: Production server

components:
  securitySchemes:
    partnerCodeAuth:
      type: apiKey
      in: header
      name: x-partner-code
      description: Partner code required for API access

  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Request successful

    PaginatedResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        items:
          type: array
          items:
            type: object
        total_pages:
          type: integer
          example: 1
        current_page:
          type: integer
          example: 0

security:
  - partnerCodeAuth: []

paths:
  /partners:
    get:
      tags: [Partner]
      summary: List Partners
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /partner:
    post:
      tags: [Partner]
      summary: Create Partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string }
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [Partner]
      summary: Update Partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer }
                name: { type: string }
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      tags: [Partner]
      summary: Delete Partner
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /file-upload:
    post:
      tags: [Upload]
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /provinces:
    get:
      tags: [Geolocation]
      summary: List Provinces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /cities:
    get:
      tags: [Geolocation]
      summary: List Cities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /districts:
