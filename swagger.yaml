  /users:
    get:
      tags: [User]
      summary: List Users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /user:
    post:
      tags: [User]
      summary: Create User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                phone: { type: string }
                password: { type: string }
                role: { type: string, enum: [admin, customer] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [User]
      summary: Update User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer }
                name: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      tags: [User]
      summary: Delete User
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /user/login:
    post:
      tags: [User]
      summary: User Login
      description: Authenticates a user and triggers an OTP to their email if successful.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identity
                - password
              properties:
                identity:
                  type: string
                  description: Email or phone number of the user.
                  example: alvineyoga@gmail.com
                password:
                  type: string
                  description: User's password.
                  example: password123
      responses:
        "200":
          description: Successful authentication, OTP sent to email.
          content:
            application/json:
              example:
                message: "OTP telah dikirim ke email anda"
                status: "otp_required"
                email: alvineyoga@gmail.com
                code: 200

  /user/admin/login:
    post:
      tags: [User]
      summary: Admin Login
      description: Authenticates an admin user (admin or super_admin) without OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identity
                - password
              properties:
                identity:
                  type: string
                  description: Email or phone number of the admin.
                  example: admin@tokotitoh.co.id
                password:
                  type: string
                  description: Admin's password.
                  example: adminpassword
      responses:
        "200":
          description: Successful admin login.
          content:
            application/json:
              example:
                status: "success"
                message: "Berhasil Login Admin"
                user:
                  id: 1
                  name: Admin
                  email: admin@tokotitoh.co.id
                  role: admin
                code: 200
        "401":
          description: Invalid password.
        "404":
          description: Admin account not found.

  /user/login/by/google:
    post:
      tags: [User]
      summary: Google Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                uid: { type: string }
                displayName: { type: string }
                photoURL: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /otp/send:
    post:
      tags: [OTP]
      summary: Send OTP
      description: Sends a 6-digit OTP to the user's email address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email address of the user.
                  example: alvineyoga@gmail.com
      responses:
        "200":
          description: OTP successfully sent
          content:
            application/json:
              example:
                status: "success"
                message: "OTP sent successfully"
                code: 200

  /otp/resend:
    post:
      tags: [OTP]
      summary: Resend OTP
      description: Resends the OTP to the user's email address. Enforces a 1-minute delay between requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: Email address of the user.
                  example: alvineyoga@gmail.com
      responses:
        "200":
          description: OTP successfully resent
          content:
            application/json:
              example:
                status: "success"
                message: "OTP sent successfully"
                code: 200

  /otp/verify:
    post:
      tags: [OTP]
      summary: Verify OTP
      description: Verifies the provided OTP for the given email address. Auto-verifies the user upon success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  format: email
                  description: Email address of the user.
                  example: alvineyoga@gmail.com
                otp:
                  type: string
                  description: 6-digit OTP received via email.
                  example: "123456"
      responses:
        "200":
          description: OTP successfully verified
          content:
            application/json:
              example:
                status: "success"
                message: "OTP verified successfully"
                code: 200

  /reports:
    get:
      tags: [Report]
      summary: List Reports
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
  /report:
