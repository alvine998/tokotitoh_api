            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [Category]
      summary: Update Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer }
                name: { type: string }
      responses:
        "200":
          description: OK
          content:
