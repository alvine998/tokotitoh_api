      tags: [SubCategory]
      summary: Create SubCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                category_id: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
